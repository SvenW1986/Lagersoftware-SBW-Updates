name: SBW Lagersoftware Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Passendes Update-Bundle prüfen
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE="Releases/SBW_Lagersoftware_UpdateBundle_${VERSION}.zip"

          if [ ! -f "$FILE" ]; then
            echo "Update-Bundle fehlt: $FILE"
            exit 1
          fi

          echo "BUNDLE_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Release erstellen und Update-Bundle anhängen
        uses: softprops/action-gh-release@v2
        with:
          name: Lagersoftware SBW ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.BUNDLE_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
